<script>
// ── CONFIG ──
const API = "__PORT_8000__".startsWith("__") ? "" : "__PORT_8000__";
const SILENCE_TIMEOUT_MS = 1800;
const SILENCE_THRESHOLD = 0.015;
const TEXT_FADE_DELAY = 4000;
const VISITOR_ID = (typeof crypto !== 'undefined' && crypto.randomUUID)
  ? crypto.randomUUID()
  : 'v-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
const COMMON_HEADERS = { 'X-Visitor-Id': VISITOR_ID };

// ── DOM ──
const bgCanvas = document.getElementById('rain-canvas');
const bgCtx = bgCanvas.getContext('2d');
const olCanvas = document.getElementById('rain-overlay');
const olCtx = olCanvas.getContext('2d');
const idleImg = document.getElementById('face-idle');
const talkImg = document.getElementById('face-talk');

const bootScreen = document.getElementById('boot-screen');
const bootText = document.getElementById('boot-text');
const textInput = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const statusEl = document.getElementById('status-indicator');
const dudeTextEl = document.getElementById('dude-text');
const codeModeEl = document.getElementById('code-mode-indicator');

// ── STATE ──
let isBusy = false;
let audioCtx = null;
let analyser = null;
let volumeData = null;
let isPlaying = false;
let audioQueue = [];
let playingAudio = false;
let currentAudioEl = null;
let currentSource = null;
let abortController = null;
let textFadeTimer = null;
let isCodeMode = false;  // tracks if current response has code

// ── AUDIO CONTEXT ──
function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.3;
    volumeData = new Uint8Array(analyser.frequencyBinCount);
    analyser.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
}

// ── STATUS ──
function setStatus(text) {
  if (text === 'thinking') {
    statusEl.innerHTML = '<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>';
    statusEl.classList.add('visible');
    statusEl.classList.remove('working-status');
  } else if (text && text.includes('man...')) {
    // Tool-use working status — pulsing style
    statusEl.textContent = text;
    statusEl.classList.add('visible', 'working-status');
  } else {
    statusEl.textContent = text || '';
    statusEl.classList.toggle('visible', !!text);
    statusEl.classList.remove('working-status');
  }
}

// ── MARKDOWN RENDERING (minimal: code blocks + inline code) ──
function renderMarkdown(text) {
  // Escape HTML first
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Fenced code blocks: ```lang\n...\n```
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
    return '<pre><code>' + code.replace(/\n$/, '') + '</code></pre>';
  });

  // Inline code: `...`
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Convert newlines to <br> (but not inside <pre> blocks)
  const parts = html.split(/(<pre>[\s\S]*?<\/pre>)/);
  html = parts.map(part => {
    if (part.startsWith('<pre>')) return part;
    return part.replace(/\n/g, '<br>');
  }).join('');

  return html;
}

// ── DUDE TEXT ──
function showDudeText(text) {
  if (textFadeTimer) clearTimeout(textFadeTimer);

  // Check if response contains code
  const hasCode = text.includes('```') || text.includes('`');
  if (hasCode && !isCodeMode) {
    isCodeMode = true;
    codeModeEl.classList.add('active');
  }

  dudeTextEl.innerHTML = renderMarkdown(text);
  dudeTextEl.classList.add('visible');

  // Auto-scroll to bottom
  dudeTextEl.scrollTop = dudeTextEl.scrollHeight;
}

function scheduleFadeDudeText() {
  if (textFadeTimer) clearTimeout(textFadeTimer);
  // Longer fade delay for code-heavy responses
  const delay = isCodeMode ? TEXT_FADE_DELAY * 3 : TEXT_FADE_DELAY;
  textFadeTimer = setTimeout(() => {
    dudeTextEl.classList.remove('visible');
    isCodeMode = false;
    codeModeEl.classList.remove('active');
  }, delay);
}
function clearDudeText() {
  if (textFadeTimer) clearTimeout(textFadeTimer);
  dudeTextEl.innerHTML = '';
  dudeTextEl.classList.remove('visible');
  isCodeMode = false;
  codeModeEl.classList.remove('active');
}

// ── INTERRUPT ──
function interruptDude() {
  if (abortController) {
    abortController.abort();
    abortController = null;
  }
  stopAllAudio();
  audioQueue = [];
  playingAudio = false;
  isPlaying = false;
  mouthTarget = 0;
  mouthOpenness = 0;
  mouthVelocity = 0;
  prevAmplitudes = [];
  visemeWeights = { A: 1, B: 0, C: 0, D: 0, E: 0, F: 0 };
  visemeTargets = { A: 1, B: 0, C: 0, D: 0, E: 0, F: 0 };
  smoothBands = { sub: 0, low: 0, lowMid: 0, mid: 0, high: 0, veryHigh: 0 };
  talkImg.style.opacity = '0';
  talkImg.style.transform = '';
  idleImg.style.opacity = '1';
  clearDudeText();
  setStatus('');
  setBusy(false);
}

function stopAllAudio() {
  if (currentAudioEl) {
    currentAudioEl.pause();
    currentAudioEl.src = '';
    currentAudioEl = null;
  }
  if (currentSource) {
    try { currentSource.disconnect(); } catch(e) {}
    currentSource = null;
  }
}

function setBusy(busy) {
  isBusy = busy;
  textInput.disabled = busy;
  sendBtn.disabled = busy;
}

// ── STREAMING CHAT ──
async function sendMessage(message) {
  if (!message.trim()) return;
  if (isBusy) {
    interruptDude();
    await new Promise(r => setTimeout(r, 50));
  }

  setBusy(true);
  clearDudeText();
  setStatus('thinking');
  ensureAudioCtx();

  abortController = new AbortController();
  audioQueue = [];

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...COMMON_HEADERS },
      body: JSON.stringify({ message: message.trim() }),
      signal: abortController.signal,
    });
    if (!res.ok) {
      const msg = res.status === 422 ? 'Message too long, man' : 'Server error, man...';
      setStatus(msg);
      setTimeout(() => setStatus(''), 3000);
      setBusy(false);
      return;
    }
    await processSSEStream(res);
  } catch (err) {
    if (err.name !== 'AbortError') {
      console.error('Chat error:', err);
      setStatus('Connection lost, man...');
      setTimeout(() => setStatus(''), 3000);
      setBusy(false);
    }
  }
}

// Voice input is handled client-side via Web Speech API (see startRecording).
// No server-side STT endpoint needed — the recognized text is sent as a
// regular chat message via sendMessage().

async function processSSEStream(response) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let fullText = '';

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let event;
        try { event = JSON.parse(line.slice(6)); } catch { continue; }

        switch (event.type) {
          case 'text':
            fullText += event.chunk;
            showDudeText(fullText);
            if (fullText.length === event.chunk.length) setStatus('');
            break;

          case 'status':
            // Tool-use status updates from the backend
            setStatus(event.message);
            break;

          case 'audio':
            console.log('Audio event received:', event.data.length, 'chars, format:', event.format || 'audio/mp3');
            audioQueue.push({ data: event.data, format: event.format || 'audio/mp3' });
            if (!playingAudio) drainAudioQueue();
            break;

          case 'transcription':
            console.log('You said:', event.text);
            break;

          case 'done':
            console.log('Stream done');
            break;

          case 'error':
            setStatus(event.message || 'Something went wrong');
            setTimeout(() => setStatus(''), 3000);
            break;
        }
      }
    }
  } catch (err) {
    if (err.name !== 'AbortError') throw err;
  }

  // If nothing to play (e.g. TTS failed/skipped), wrap up
  if (audioQueue.length === 0 && !playingAudio) {
    if (fullText) scheduleFadeDudeText();
    setBusy(false);
  }
}

// ── VISITOR ID GETTER (for debugging) ──
function getVisitorId() { return VISITOR_ID; }

// ── AUDIO PLAYBACK via HTML5 Audio + Web Audio analyser ──
async function drainAudioQueue() {
  if (playingAudio) return;
  playingAudio = true;
  ensureAudioCtx();

  // Safety timeout: if audio hangs for 30s, force recovery
  const safetyTimer = setTimeout(() => {
    console.warn('Audio drain safety timeout — forcing recovery');
    audioQueue.length = 0;
    playingAudio = false;
    isPlaying = false;
    stopTalking();
    scheduleFadeDudeText();
    setBusy(false);
  }, 30000);

  while (audioQueue.length > 0) {
    const item = audioQueue.shift();
    try {
      await playAudioChunk(item.data, item.format);
    } catch (err) {
      console.error('Playback error:', err);
    }
  }

  clearTimeout(safetyTimer);
  playingAudio = false;
  isPlaying = false;
  stopTalking();
  scheduleFadeDudeText();
  setBusy(false);
}

function playAudioChunk(b64data, format) {
  const mimeType = format || 'audio/mp3';
  return new Promise((resolve, reject) => {
    try {
      const binary = atob(b64data);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], { type: mimeType });
      const url = URL.createObjectURL(blob);

      const audio = new Audio();
      audio.crossOrigin = 'anonymous';

      let source = null;
      try {
        source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        currentSource = source;
      } catch (e) {
        console.warn('Could not connect audio to analyser:', e);
      }

      currentAudioEl = audio;
      isPlaying = true;

      audio.onended = () => {
        URL.revokeObjectURL(url);
        currentAudioEl = null;
        if (source) {
          try { source.disconnect(); } catch(e) {}
        }
        currentSource = null;
        resolve();
      };

      audio.onerror = (e) => {
        console.error('Audio element error:', e);
        URL.revokeObjectURL(url);
        currentAudioEl = null;
        playViaWebAudioAPI(bytes.buffer.slice(0)).then(resolve).catch(reject);
      };

      audio.src = url;
      audio.play().catch(err => {
        console.warn('Audio.play() rejected, trying Web Audio fallback:', err);
        URL.revokeObjectURL(url);
        currentAudioEl = null;
        playViaWebAudioAPI(bytes.buffer.slice(0)).then(resolve).catch(reject);
      });

    } catch (err) {
      reject(err);
    }
  });
}

function playViaWebAudioAPI(arrayBuffer) {
  return new Promise((resolve, reject) => {
    audioCtx.decodeAudioData(arrayBuffer).then(audioBuffer => {
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(analyser);
      isPlaying = true;

      source.onended = () => {
        resolve();
      };
      source.start(0);
    }).catch(err => {
      console.error('Web Audio decode failed:', err);
      reject(err);
    });
  });
}

// ── VISEME MOUTH ANIMATION SYSTEM ──
// 6 Preston-Blair mouth shapes driven by frequency-band analysis
const mouthSvg = document.getElementById('mouth-svg');
const blinkBar = document.getElementById('blink-bar');
const NOISE_FLOOR = 10;
const FULL_OPEN_LEVEL = 75;

// Smoothed viseme weights (A-F), each 0..1
let visemeWeights = { A: 1, B: 0, C: 0, D: 0, E: 0, F: 0 };
let visemeTargets = { A: 1, B: 0, C: 0, D: 0, E: 0, F: 0 };
// Smoothed band energies for hysteresis
let smoothBands = { sub: 0, low: 0, lowMid: 0, mid: 0, high: 0, veryHigh: 0 };
// Legacy compat
let mouthOpenness = 0;
let mouthTarget = 0;
let mouthVelocity = 0;
let prevAmplitudes = [];

// Idle animation state
let idleSwayPhase = Math.random() * Math.PI * 2;
let nextBlinkTime = performance.now() + 2000 + Math.random() * 4000;
let blinkActive = false;
let blinkStartTime = 0;
const BLINK_DURATION = 150; // ms

let timeDomainData = null;
function ensureTimeDomainBuffer() {
  if (!timeDomainData && analyser) {
    timeDomainData = new Uint8Array(analyser.fftSize);
  }
}

// ── FREQUENCY BAND ANALYSIS ──
// With 256 FFT and ~44100Hz sample rate, each bin ≈ 172Hz
// Bin mapping: bin_index = freq / (sampleRate / fftSize)
function getFrequencyBands() {
  if (!analyser || !volumeData) return { sub: 0, low: 0, lowMid: 0, mid: 0, high: 0, veryHigh: 0, total: 0 };
  analyser.getByteFrequencyData(volumeData);

  const sr = (audioCtx && audioCtx.sampleRate) || 44100;
  const binHz = sr / analyser.fftSize; // ~172Hz per bin

  function bandEnergy(loHz, hiHz) {
    const loBin = Math.max(0, Math.floor(loHz / binHz));
    const hiBin = Math.min(volumeData.length - 1, Math.ceil(hiHz / binHz));
    if (hiBin <= loBin) return 0;
    let sum = 0;
    for (let i = loBin; i <= hiBin; i++) sum += volumeData[i];
    return sum / (hiBin - loBin + 1);
  }

  const sub     = bandEnergy(60, 200);
  const low     = bandEnergy(200, 500);
  const lowMid  = bandEnergy(500, 1000);
  const mid     = bandEnergy(1000, 2500);
  const high    = bandEnergy(2500, 4000);
  const veryHigh = bandEnergy(4000, 8000);

  // Overall energy for amplitude
  let totalSum = 0;
  for (let i = 0; i < volumeData.length; i++) totalSum += volumeData[i];
  const total = totalSum / volumeData.length;

  return { sub, low, lowMid, mid, high, veryHigh, total };
}

// Legacy-compatible amplitude for talk image overlay
function getAudioAmplitude() {
  if (!analyser || !volumeData) return 0;
  // volumeData already filled by getFrequencyBands
  let speechSum = 0;
  const speechStart = 2;
  const speechEnd = Math.min(40, volumeData.length);
  for (let i = speechStart; i < speechEnd; i++) speechSum += volumeData[i];
  return speechSum / (speechEnd - speechStart);
}

// ── VISEME WEIGHT COMPUTATION ──
// Maps frequency bands → 6 mouth shape weights
function computeVisemeWeights(bands) {
  const { sub, low, lowMid, mid, high, veryHigh, total } = bands;

  // Normalize bands to 0..1 range (frequency data is 0..255)
  const nSub     = sub / 255;
  const nLow     = low / 255;
  const nLowMid  = lowMid / 255;
  const nMid     = mid / 255;
  const nHigh    = high / 255;
  const nVHigh   = veryHigh / 255;
  const nTotal   = total / 255;

  // Smooth the band energies for stability
  const smooth = 0.3; // lower = more responsive
  smoothBands.sub     = smoothBands.sub * smooth + nSub * (1 - smooth);
  smoothBands.low     = smoothBands.low * smooth + nLow * (1 - smooth);
  smoothBands.lowMid  = smoothBands.lowMid * smooth + nLowMid * (1 - smooth);
  smoothBands.mid     = smoothBands.mid * smooth + nMid * (1 - smooth);
  smoothBands.high    = smoothBands.high * smooth + nHigh * (1 - smooth);
  smoothBands.veryHigh = smoothBands.veryHigh * smooth + nVHigh * (1 - smooth);

  const s = smoothBands;
  const energy = (s.sub + s.low + s.lowMid + s.mid + s.high + s.veryHigh) / 6;

  // Below noise floor → silent (A)
  if (energy < NOISE_FLOOR / 255) {
    return { A: 1, B: 0, C: 0, D: 0, E: 0, F: 0 };
  }

  // Raw shape scores based on frequency band patterns
  // B: closed consonants (M/B/P) — low energy in low bands, low total
  const bScore = Math.max(0, s.sub * 0.5 + s.low * 0.3 - s.mid * 0.3 - s.high * 0.3) * (energy < 0.25 ? 2 : 0.5);

  // C: open vowels (AH/AA) — strong low + low-mid
  const cScore = Math.max(0, (s.low * 0.5 + s.lowMid * 0.5) - s.high * 0.2);

  // D: narrow vowels (E/I) — strong mid, less low
  const dScore = Math.max(0, s.mid * 0.6 + s.lowMid * 0.3 - s.low * 0.2);

  // E: round vowels (O/U) — strong low, less mid
  const eScore = Math.max(0, s.low * 0.6 + s.sub * 0.3 - s.mid * 0.3);

  // F: fricatives (F/TH/S) — strong high + very-high
  const fScore = Math.max(0, s.high * 0.5 + s.veryHigh * 0.5);

  // Normalize to weights that sum to ~1
  const total2 = bScore + cScore + dScore + eScore + fScore;
  if (total2 < 0.01) {
    return { A: 1, B: 0, C: 0, D: 0, E: 0, F: 0 };
  }

  const scale = 1 / total2;
  return {
    A: 0, // Not silent if we got here
    B: bScore * scale,
    C: cScore * scale,
    D: dScore * scale,
    E: eScore * scale,
    F: fScore * scale,
  };
}

// ── SVG MOUTH SHAPE DEFINITIONS ──
// Each shape is defined as SVG path data in a 120x80 viewBox
// Shapes are designed in Matrix green aesthetic
const MOUTH_SHAPES = {
  // A: Thin horizontal line (lips together, neutral)
  A: { d: 'M 25,40 Q 60,42 95,40', fill: 'none', strokeWidth: 2.5 },
  // B: Small pursed shape (closed consonants M/B/P)
  B: { d: 'M 40,35 Q 50,30 60,35 Q 68,40 60,45 Q 50,50 40,45 Q 32,40 40,35 Z', fill: 'rgba(0,255,65,0.08)', strokeWidth: 2 },
  // C: Wide tall oval (open AH)
  C: { d: 'M 25,30 Q 60,10 95,30 Q 105,45 95,55 Q 60,72 25,55 Q 15,45 25,30 Z', fill: 'rgba(0,255,65,0.12)', strokeWidth: 2.5 },
  // D: Medium wide, not as tall (E/I)
  D: { d: 'M 28,35 Q 60,25 92,35 Q 98,42 92,48 Q 60,56 28,48 Q 22,42 28,35 Z', fill: 'rgba(0,255,65,0.10)', strokeWidth: 2 },
  // E: Small round circle (O/U)
  E: { d: 'M 42,30 Q 52,22 62,30 Q 70,40 62,50 Q 52,58 42,50 Q 34,40 42,30 Z', fill: 'rgba(0,255,65,0.10)', strokeWidth: 2 },
  // F: Wide horizontal, teeth showing (F/S/TH)
  F: {
    d: 'M 22,35 Q 60,30 98,35 Q 102,40 98,45 Q 60,50 22,45 Q 18,40 22,35 Z',
    fill: 'rgba(0,255,65,0.06)', strokeWidth: 2,
    teeth: 'M 35,38 L 45,38 L 45,42 L 35,42 Z M 50,37 L 60,37 L 60,42 L 50,42 Z M 65,37 L 75,37 L 75,42 L 65,42 Z M 80,38 L 88,38 L 88,42 L 80,42 Z'
  },
};

// ── SVG MOUTH RENDERING ──
// Interpolates between mouth shapes based on viseme weights
function renderMouthSVG(weights) {
  // Find the two strongest visemes for blending
  let sorted = Object.entries(weights)
    .filter(([k]) => k !== 'A')
    .sort((a, b) => b[1] - a[1]);

  const totalNonA = sorted.reduce((s, [, w]) => s + w, 0);
  const aWeight = weights.A || 0;

  // Position the SVG relative to the image
  // Portrait is 1024x1536, displayed as object-fit:contain
  // Mouth area is ~55-60% down, centered
  positionMouthSVG();

  // Clear previous
  let svgContent = '';
  const green = '#00ff41';

  if (totalNonA < 0.05) {
    // Mostly silent: show shape A
    const shape = MOUTH_SHAPES.A;
    svgContent = `<path d="${shape.d}" fill="${shape.fill || 'none'}" stroke="${green}" stroke-width="${shape.strokeWidth}" stroke-linecap="round" opacity="0.7"/>`;
  } else {
    // Blend the shapes — draw each with its weight as opacity
    // Start with A at its weight
    if (aWeight > 0.05) {
      const shapeA = MOUTH_SHAPES.A;
      svgContent += `<path d="${shapeA.d}" fill="none" stroke="${green}" stroke-width="${shapeA.strokeWidth}" stroke-linecap="round" opacity="${(aWeight * 0.7).toFixed(3)}"/>`;
    }

    // Draw non-A shapes weighted by their scores
    for (const [key, weight] of sorted) {
      if (weight < 0.02) continue;
      const shape = MOUTH_SHAPES[key];
      const opacity = Math.min(1, weight * 1.2); // slightly boost for visibility
      svgContent += `<path d="${shape.d}" fill="${shape.fill || 'none'}" stroke="${green}" stroke-width="${shape.strokeWidth}" stroke-linecap="round" opacity="${opacity.toFixed(3)}"/>`;
      if (shape.teeth && weight > 0.3) {
        svgContent += `<path d="${shape.teeth}" fill="rgba(0,255,65,0.15)" stroke="${green}" stroke-width="0.5" opacity="${(weight * 0.6).toFixed(3)}"/>`;
      }
    }
  }

  mouthSvg.innerHTML = svgContent;
}

// ── MOUTH POSITIONING ──
// Calculates where the mouth should be on screen based on portrait dimensions
function positionMouthSVG() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Portrait is 1024x1536, displayed as object-fit:contain
  const imgAspect = 1024 / 1536;
  const vpAspect = vw / vh;

  let imgW, imgH, imgX, imgY;
  if (vpAspect > imgAspect) {
    // Viewport wider than image → image fills height
    imgH = vh;
    imgW = vh * imgAspect;
    imgX = (vw - imgW) / 2;
    imgY = 0;
  } else {
    // Viewport taller than image → image fills width
    imgW = vw;
    imgH = vw / imgAspect;
    imgX = 0;
    imgY = (vh - imgH) / 2;
  }

  // Mouth position: ~57% down, centered horizontally in the portrait
  const mouthCenterX = imgX + imgW * 0.50;
  const mouthCenterY = imgY + imgH * 0.575;
  const mouthWidth = imgW * 0.12;   // mouth is ~12% of image width
  const mouthHeight = mouthWidth * (80 / 120); // preserve viewBox ratio

  mouthSvg.style.width = mouthWidth + 'px';
  mouthSvg.style.height = mouthHeight + 'px';
  mouthSvg.style.left = (mouthCenterX - mouthWidth / 2) + 'px';
  mouthSvg.style.top = (mouthCenterY - mouthHeight / 2) + 'px';

  // Also position blink bar over eye area (~38% down)
  const eyeCenterY = imgY + imgH * 0.38;
  const eyeWidth = imgW * 0.28;
  const eyeHeight = imgH * 0.025;
  blinkBar.style.width = eyeWidth + 'px';
  blinkBar.style.height = eyeHeight + 'px';
  blinkBar.style.left = (imgX + imgW * 0.50 - eyeWidth / 2) + 'px';
  blinkBar.style.top = (eyeCenterY - eyeHeight / 2) + 'px';
}

// ── TALK IMAGE OVERLAY ──
// Still use talk image as subtle overlay for jaw/face movement during high amplitude
function applyTalkOverlay(amplitude) {
  const norm = Math.max(0, Math.min(1, (amplitude - NOISE_FLOOR) / (FULL_OPEN_LEVEL - NOISE_FLOOR)));
  // Subtle overlay: max 40% opacity, only at high amplitude
  const talkOpacity = Math.pow(norm, 1.2) * 0.4;
  talkImg.style.opacity = String(talkOpacity);
  idleImg.style.opacity = '1';

  if (norm > 0.05) {
    const scaleY = 1 + norm * 0.008;
    const translateY = norm * 0.2;
    talkImg.style.transform = `scaleY(${scaleY}) translateY(${translateY}%)`;
  } else {
    talkImg.style.transform = '';
  }
}

// ── IDLE ANIMATIONS ──
function updateIdleAnimations(now) {
  const faceLayer = document.getElementById('face-layer');

  // Head sway — sinusoidal, very subtle
  idleSwayPhase += 0.003; // slow period ~5-6s
  const swayX = Math.sin(idleSwayPhase) * 1.5 + Math.sin(idleSwayPhase * 0.7) * 0.5;
  const swayRot = Math.sin(idleSwayPhase * 0.8) * 0.3;

  // More movement when speaking
  const speakMult = isPlaying ? 1.8 : 1.0;
  const totalX = swayX * speakMult + (crtGlitchX || 0);
  const breathScale = getBreathingScaleY();
  faceLayer.style.transform = `translateX(${totalX}px) rotate(${swayRot * speakMult}deg) scaleY(${breathScale})`;

  // Eye blinks
  if (!blinkActive && now >= nextBlinkTime) {
    blinkActive = true;
    blinkStartTime = now;
    blinkBar.style.opacity = '1';
  }

  if (blinkActive) {
    const elapsed = now - blinkStartTime;
    if (elapsed >= BLINK_DURATION) {
      blinkActive = false;
      blinkBar.style.opacity = '0';
      // Schedule next blink: 3-6s
      nextBlinkTime = now + 3000 + Math.random() * 3000;
    } else {
      // Smooth blink curve: quick close then open
      const t = elapsed / BLINK_DURATION;
      const blinkOpacity = t < 0.4 ? (t / 0.4) : (1 - (t - 0.4) / 0.6);
      blinkBar.style.opacity = String(Math.pow(blinkOpacity, 0.5) * 0.85);
    }
  }
}

// ── ENHANCED BREATHING ──
// Add subtle scaleY to face layer for breathing effect
function getBreathingScaleY() {
  return 1.0 + 0.003 * Math.sin(breathPhase * 0.5);
}

// ── MAIN ANIMATION UPDATE ──
function updateMouthAnimation() {
  const now = performance.now();

  if (isPlaying && analyser && volumeData) {
    const bands = getFrequencyBands();
    const amplitude = getAudioAmplitude();

    // Compute viseme targets from frequency bands
    visemeTargets = computeVisemeWeights(bands);

    // Smooth interpolation toward targets (fast attack, slow release)
    for (const key of ['A', 'B', 'C', 'D', 'E', 'F']) {
      const diff = visemeTargets[key] - visemeWeights[key];
      const speed = diff > 0 ? 0.25 : 0.12;
      visemeWeights[key] += diff * speed;
      visemeWeights[key] = Math.max(0, Math.min(1, visemeWeights[key]));
    }

    // Render SVG mouth
    renderMouthSVG(visemeWeights);

    // Subtle talk image overlay for jaw movement
    applyTalkOverlay(amplitude);

    // Legacy compat
    mouthOpenness = 1 - visemeWeights.A;

  } else if (!isPlaying) {
    // Ease visemes back to A (silent)
    let anyActive = false;
    for (const key of ['B', 'C', 'D', 'E', 'F']) {
      if (visemeWeights[key] > 0.005) {
        visemeWeights[key] *= 0.88; // decay
        anyActive = true;
      } else {
        visemeWeights[key] = 0;
      }
    }
    visemeWeights.A = 1 - (visemeWeights.B + visemeWeights.C + visemeWeights.D + visemeWeights.E + visemeWeights.F);

    renderMouthSVG(visemeWeights);

    if (!anyActive) {
      talkImg.style.opacity = '0';
      talkImg.style.transform = '';
      idleImg.style.opacity = '1';
      mouthOpenness = 0;
    } else {
      applyTalkOverlay(mouthOpenness * FULL_OPEN_LEVEL);
    }
  }

  // Idle animations always run
  updateIdleAnimations(now);

  requestAnimationFrame(updateMouthAnimation);
}

function stopTalking() {
  mouthTarget = 0;
}

// Reposition on resize
window.addEventListener('resize', positionMouthSVG);

// ── MIC + SPEECH RECOGNITION ──
let isRecording = false;
let recognition = null;

function getSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.continuous = false;
  r.interimResults = false;
  r.lang = 'en-US';
  r.maxAlternatives = 1;
  return r;
}

async function startRecording() {
  ensureAudioCtx();
  if (isBusy || isPlaying) {
    interruptDude();
    await new Promise(r => setTimeout(r, 50));
  }

  recognition = getSpeechRecognition();
  if (!recognition) {
    setStatus('Speech recognition not supported, man');
    setTimeout(() => setStatus(''), 3000);
    return;
  }

  isRecording = true;
  micBtn.classList.add('recording');
  setStatus('Listening...');

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    console.log('You said:', transcript);
    stopRecording();
    if (transcript.trim()) {
      sendMessage(transcript.trim());
    }
  };

  recognition.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    stopRecording();
    if (event.error === 'no-speech') {
      setStatus('No speech detected, man');
    } else if (event.error === 'not-allowed') {
      setStatus('Mic access denied, man');
    } else {
      setStatus('Voice error: ' + event.error);
    }
    setTimeout(() => setStatus(''), 3000);
  };

  recognition.onend = () => {
    if (isRecording) stopRecording();
  };

  try {
    recognition.start();
  } catch (err) {
    console.error('Mic error:', err);
    setStatus('Mic access denied, man');
    setTimeout(() => setStatus(''), 3000);
    stopRecording();
  }
}

function stopRecording() {
  isRecording = false;
  micBtn.classList.remove('recording');
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
    recognition = null;
  }
}

// ── EVENTS ──
sendBtn.addEventListener('click', () => {
  const msg = textInput.value;
  textInput.value = '';
  sendMessage(msg);
});

textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const msg = textInput.value;
    textInput.value = '';
    sendMessage(msg);
  }
});

textInput.addEventListener('input', () => {
  if (isPlaying && textInput.value.length > 0) {
    interruptDude();
  }
});

micBtn.addEventListener('click', () => {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
});

// ── MATRIX RAIN ──
function resizeCanvases() {
  bgCanvas.width = olCanvas.width = window.innerWidth;
  bgCanvas.height = olCanvas.height = window.innerHeight;
}
resizeCanvases();
window.addEventListener('resize', resizeCanvases);

const matrixChars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン日月木水火土金0123456789';
const fontSize = 14;

function createRainState(w) {
  const cols = Math.floor(w / fontSize);
  return {
    drops: Array.from({length: cols}, () => Math.random() * -100),
    speeds: Array.from({length: cols}, () => 0.15 + Math.random() * 0.75),
    bright: Array.from({length: cols}, () => Math.random()),
  };
}
let bgRain = createRainState(window.innerWidth);
let olRain = createRainState(window.innerWidth);
window.addEventListener('resize', () => {
  resizeCanvases();
  bgRain = createRainState(window.innerWidth);
  olRain = createRainState(window.innerWidth);
});

function drawRainLayer(ctx, rain, fade) {
  ctx.fillStyle = `rgba(0,0,0,${fade})`;
  ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  ctx.font = `${fontSize}px 'Courier New', monospace`;
  for (let i = 0; i < rain.drops.length; i++) {
    const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
    const x = i * fontSize;
    const y = rain.drops[i] * fontSize;
    if (Math.random() > 0.97) {
      ctx.fillStyle = '#aaffaa';
      ctx.shadowColor = '#00ff41';
      ctx.shadowBlur = 10;
    } else {
      const g = Math.floor(35 + rain.bright[i] * 120);
      ctx.fillStyle = `rgb(0,${g},${Math.floor(g * 0.12)})`;
      ctx.shadowBlur = 0;
    }
    ctx.fillText(char, x, y);
    ctx.shadowBlur = 0;
    if (y > ctx.canvas.height && Math.random() > 0.975) {
      rain.drops[i] = 0;
      rain.bright[i] = Math.random();
    }
    rain.drops[i] += rain.speeds[i];
  }
}

// ── BREATHING GLOW ──
let breathPhase = 0;
function updateBreathing() {
  breathPhase += 0.008;
  const i = 0.82 + 0.18 * Math.sin(breathPhase);
  const g1 = 22 + 18 * Math.sin(breathPhase);
  const g2 = 45 + 30 * Math.sin(breathPhase * 0.7);
  const f = `drop-shadow(0 0 ${g1}px rgba(0,255,65,${0.22*i})) drop-shadow(0 0 ${g2}px rgba(0,255,65,${0.08*i}))`;
  idleImg.style.filter = f;
  talkImg.style.filter = f;
}

// ── CRT ──
let crtGlitchX = 0;
function crtEffects() {
  const layer = document.getElementById('face-layer');
  if (Math.random() > 0.97) {
    layer.style.opacity = String(0.7 + Math.random() * 0.3);
    setTimeout(() => { layer.style.opacity = '1'; }, 25 + Math.random() * 60);
  }
  if (Math.random() > 0.994) {
    crtGlitchX = (Math.random() - 0.5) * 10;
    setTimeout(() => { crtGlitchX = 0; }, 35 + Math.random() * 80);
  }
  requestAnimationFrame(crtEffects);
}

// ── MAIN LOOP ──
function mainLoop() {
  drawRainLayer(bgCtx, bgRain, 0.045);
  drawRainLayer(olCtx, olRain, 0.055);
  updateBreathing();
  requestAnimationFrame(mainLoop);
}

// ── BOOT ──
function boot() {
  const lines = [
    '> INITIALIZING THE DUDE PROTOCOL...',
    '> LOADING CONSCIOUSNESS MATRIX...',
    '> CALIBRATING WHITE RUSSIAN SENSORS...',
    '> FINDING RUG THAT TIES ROOM TOGETHER...',
    '> CONNECTING TO COMPUTER...',
    '> ESTABLISHING CDP LINK TO COMET...',
    '> THE DUDE ABIDES...',
  ];
  let shown = '';
  let idx = 0;
  (function next() {
    if (idx < lines.length) {
      shown += (shown ? '\n' : '') + lines[idx];
      bootText.textContent = shown;
      idx++;
      setTimeout(next, 400 + Math.random() * 300);
    } else {
      setTimeout(() => {
        bootScreen.classList.add('hidden');
        setTimeout(() => {
          bootScreen.style.display = 'none';
          textInput.focus();
        }, 1000);
      }, 800);
    }
  })();
}

// ── START ──
let loaded = 0;
let started = false;
function tryStart() {
  if (started || loaded < 2) return;
  started = true;
  mainLoop(); crtEffects(); updateMouthAnimation();
  setTimeout(boot, 400);
}
function onReady() {
  loaded++;
  tryStart();
}
idleImg.onload = onReady;
talkImg.onload = onReady;
if (idleImg.complete) loaded++;
if (talkImg.complete) loaded++;
tryStart();
</script>
